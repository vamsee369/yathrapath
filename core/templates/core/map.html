{% extends 'core/base.html' %}

{% block content %}
<div class="relative w-full h-screen">
    <!-- Full-screen map -->
    <div id="map" class="w-full h-full z-0"></div>
</div>

<!-- Script to polish navbar only for map page -->
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const navbar = document.getElementById("navbar");

        if (navbar) {
            // Make it fixed and above everything
            navbar.classList.add(
                "fixed", "top-6", "left-1/2", "-translate-x-1/2",
                "z-[999]", "pointer-events-auto"
            );


        }
    });
</script>
<script>
    document.addEventListener("DOMContentLoaded", function () {

        var map = L.map('map').setView([20.5937, 78.9629], 5);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        var markers = [];

        // Custom Icons
        var greenIcon = new L.Icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        var redIcon = new L.Icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        var blueIcon = new L.Icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        {% for temple in all_temples %}
        var icon;

        {% if temple.status == "completed" %}
        icon = greenIcon;
        {% elif temple.status == "planned" %}
        icon = blueIcon;
        {% else %}
        icon = redIcon;
        {% endif %}

        var marker = L.marker(
            [{{ temple.latitude }}, {{ temple.longitude }}],
        { icon: icon }
    )
        .addTo(map)
        .bindPopup(`
            <div style="text-align:center;">
                <strong>{{ temple.name }}</strong><br>
                {{ temple.location }}<br>
                <em>Status: {{ temple.status }}</em>
            </div>
        `);

    markers.push(marker);
    {% endfor %}

    if (markers.length > 0) {
        var group = new L.featureGroup(markers);
        map.fitBounds(group.getBounds().pad(0.2));
    }

});
</script>
{% endblock %}
