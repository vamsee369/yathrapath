<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YatraPath — Lost in the Path</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #eab308;
      --gold-dim: rgba(234,179,8,0.15);
      --gold-glow: rgba(234,179,8,0.4);
      --bg: #050508;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(234,179,8,0.2);
      --text-muted: #6b7280;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: #fff;
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .mandala {
      position: fixed;
      width: 600px;
      height: 600px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.04;
      animation: spin 60s linear infinite;
      pointer-events: none;
    }

    @keyframes spin {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: var(--gold);
      border-radius: 50%;
      animation: float linear infinite;
      opacity: 0;
    }

    @keyframes float {
      0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-10vh) translateX(var(--drift)); opacity: 0; }
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      animation: pulse 4s ease-in-out infinite alternate;
    }
    .orb-1 { width: 400px; height: 400px; background: rgba(234,179,8,0.06); top: -100px; left: -100px; }
    .orb-2 { width: 300px; height: 300px; background: rgba(234,100,8,0.05); bottom: -80px; right: -80px; animation-delay: 2s; }

    @keyframes pulse {
      from { transform: scale(1); opacity: 0.5; }
      to   { transform: scale(1.2); opacity: 1; }
    }

    .card {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 90%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 60px rgba(234,179,8,0.08), inset 0 1px 0 rgba(255,255,255,0.06);
      animation: cardIn 0.8s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .temple-icon {
      font-size: 3.5rem;
      display: block;
      margin-bottom: 1.2rem;
      animation: iconFloat 3s ease-in-out infinite;
      filter: drop-shadow(0 0 20px var(--gold-glow));
    }

    @keyframes iconFloat {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 14px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      border: 1px solid;
      animation: badgeIn 0.6s 0.3s both;
    }

    @keyframes badgeIn {
      from { opacity: 0; transform: scale(0.8); }
      to   { opacity: 1; transform: scale(1); }
    }

    .status-badge.offline {
      background: rgba(239,68,68,0.1);
      border-color: rgba(239,68,68,0.3);
      color: #f87171;
    }

    .status-badge.notfound {
      background: rgba(234,179,8,0.1);
      border-color: rgba(234,179,8,0.3);
      color: var(--gold);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      color: var(--gold);
      margin-bottom: 0.75rem;
      line-height: 1.2;
      animation: fadeUp 0.6s 0.2s both;
    }

    p {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 2rem;
      font-weight: 300;
      animation: fadeUp 0.6s 0.35s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .cached-section {
      margin-bottom: 2rem;
      animation: fadeUp 0.6s 0.5s both;
    }

    .cached-label {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    .cached-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .cached-link {
      padding: 6px 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--gold-dim);
      color: var(--gold);
      font-size: 0.8rem;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.2s;
      cursor: pointer;
    }

    .cached-link:hover {
      background: rgba(234,179,8,0.25);
      border-color: var(--gold);
      box-shadow: 0 0 12px var(--gold-glow);
      transform: translateY(-1px);
    }

    .btn-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeUp 0.6s 0.55s both;
    }

    .btn-primary {
      padding: 0.7rem 1.8rem;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.9rem;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(234,179,8,0.3);
    }

    .btn-primary:hover {
      background: #fbbf24;
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(234,179,8,0.5);
    }

    .btn-secondary {
      padding: 0.7rem 1.8rem;
      background: transparent;
      color: #9ca3af;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      font-weight: 500;
      font-size: 0.9rem;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .btn-secondary:hover {
      border-color: rgba(255,255,255,0.25);
      color: #fff;
      transform: translateY(-2px);
    }

    .conn-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 0.75rem;
      font-weight: 500;
      z-index: 100;
      transition: all 0.4s;
    }

    .conn-bar.offline-bar {
      background: rgba(239,68,68,0.15);
      border-bottom: 1px solid rgba(239,68,68,0.2);
      color: #f87171;
    }

    .conn-bar.online-bar {
      background: rgba(34,197,94,0.15);
      border-bottom: 1px solid rgba(34,197,94,0.2);
      color: #4ade80;
    }

    .conn-bar.notfound-bar {
      background: rgba(234,179,8,0.1);
      border-bottom: 1px solid rgba(234,179,8,0.2);
      color: #eab308;
    }

    .conn-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 1.5rem 0;
    }

    /* Loading state */
    .detecting {
      opacity: 0.5;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div class="conn-bar offline-bar" id="connBar">
    <div class="conn-dot"></div>
    <span id="connText">Checking connection...</span>
  </div>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <svg class="mandala" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="100" cy="100" r="90" stroke="#eab308" stroke-width="0.5"/>
    <circle cx="100" cy="100" r="70" stroke="#eab308" stroke-width="0.5"/>
    <circle cx="100" cy="100" r="50" stroke="#eab308" stroke-width="0.5"/>
    <circle cx="100" cy="100" r="30" stroke="#eab308" stroke-width="0.5"/>
    <line x1="100" y1="10" x2="100" y2="190" stroke="#eab308" stroke-width="0.5"/>
    <line x1="10" y1="100" x2="190" y2="100" stroke="#eab308" stroke-width="0.5"/>
    <line x1="27" y1="27" x2="173" y2="173" stroke="#eab308" stroke-width="0.5"/>
    <line x1="173" y1="27" x2="27" y2="173" stroke="#eab308" stroke-width="0.5"/>
    <polygon points="100,15 115,85 185,100 115,115 100,185 85,115 15,100 85,85" stroke="#eab308" stroke-width="0.5" fill="none"/>
    <polygon points="100,35 120,80 165,100 120,120 100,165 80,120 35,100 80,80" stroke="#eab308" stroke-width="0.3" fill="none"/>
  </svg>

  <div class="particles" id="particles"></div>

  <div class="card">
    <span class="temple-icon">&#x1F6D5;</span>

    <div class="status-badge offline" id="statusBadge">
      <div class="status-dot"></div>
      <span id="statusText">Detecting...</span>
    </div>

    <h1 id="mainTitle">Please wait...</h1>
    <p id="mainDesc">Checking your connection status.</p>

    <div class="cached-section" id="cachedSection" style="display:none;">
      <div class="cached-label">Available offline</div>
      <div class="cached-links">
        <a class="cached-link" href="/">&#x1F3E0; Home</a>
        <a class="cached-link" href="/about/">&#x1F4D6; About</a>
        <a class="cached-link" href="/temples/">&#x1F6D5; Temples</a>
        <a class="cached-link" href="/blog/">&#x1F4DC; Blog</a>
        <a class="cached-link" href="/map/">&#x1F5FA; Map</a>
      </div>
    </div>

    <div class="divider"></div>

    <div class="btn-group">
      <a href="/" class="btn-primary">&#x27F3; Try Again</a>
      <button onclick="window.history.back()" class="btn-secondary">&#x2190; Go Back</button>
    </div>
  </div>

  <script>
    // ── Particles ──────────────────────────────────
    const container = document.getElementById('particles');
    for (let i = 0; i < 25; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.cssText = `
        left: ${Math.random() * 100}%;
        --drift: ${(Math.random() - 0.5) * 100}px;
        animation-duration: ${6 + Math.random() * 10}s;
        animation-delay: ${Math.random() * 10}s;
        width: ${1 + Math.random() * 2}px;
        height: ${1 + Math.random() * 2}px;
      `;
      container.appendChild(p);
    }

    function setOfflineMode() {
      document.getElementById('connBar').className = 'conn-bar offline-bar';
      document.getElementById('connText').textContent = 'No internet connection';
      document.getElementById('statusBadge').className = 'status-badge offline';
      document.getElementById('statusText').textContent = 'Offline';
      document.getElementById('mainTitle').textContent = 'Lost on the Path';
      document.getElementById('mainDesc').textContent = "You're currently offline. Some sacred pages are available from your last visit — explore what's been saved for you.";
      document.getElementById('cachedSection').style.display = 'block';
    }

    function setNotFoundMode() {
      document.getElementById('connBar').className = 'conn-bar notfound-bar';
      document.getElementById('connText').textContent = 'Page not found';
      document.getElementById('statusBadge').className = 'status-badge notfound';
      document.getElementById('statusText').textContent = '404 — Not Found';
      document.getElementById('mainTitle').textContent = "This Path Doesn't Exist";
      document.getElementById('mainDesc').textContent = "The page you're looking for hasn't been built yet — or may have moved to a different path. Head back to explore the temples.";
      document.getElementById('cachedSection').style.display = 'none';
    }

    // ── Smart detection: actually ping the server ──
    // More reliable than navigator.onLine which DevTools throttle doesn't always update
    async function detectMode() {
      try {
        const res = await fetch('/static/manifest.json', {
          cache: 'no-store',
          signal: AbortSignal.timeout(3000)
        });
        if (res.ok) {
          setNotFoundMode(); // server reachable = we're online = this is a 404
        } else {
          setOfflineMode();
        }
      } catch {
        setOfflineMode(); // fetch failed = truly offline
      }
    }

    detectMode();

    // ── Listen for real connection changes ──────────
    window.addEventListener('online', () => {
      document.getElementById('connBar').className = 'conn-bar online-bar';
      document.getElementById('connText').textContent = 'Connection restored — reloading...';
      setTimeout(() => window.location.href = '/', 1500);
    });

    window.addEventListener('offline', () => {
      setOfflineMode();
    });
  </script>
</body>
</html>
