{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>YatraPath</title>
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@400;500&display=swap"
        rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        .leaflet-popup-content-wrapper {
            background: rgba(15, 15, 26, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            color: white;
        }

        .leaflet-popup-tip {
            background: rgba(15, 15, 26, 0.9);
        }
    </style>
</head>

<body
    class="relative min-h-screen bg-gradient-to-br from-[#0f0f1a] via-[#1a1a2e] to-[#000000] text-white overflow-x-hidden {% block body_class %}{% endblock %}">

    <!-- Background Glow -->
    <div class="absolute w-96 h-96 bg-yellow-500 opacity-20 rounded-full blur-3xl top-10 left-10 animate-pulse"></div>
    <div class="absolute w-96 h-96 bg-orange-500 opacity-20 rounded-full blur-3xl bottom-10 right-10 animate-pulse">
    </div>

    <!-- Floating Center Glass Navbar -->
    <!-- Navbar -->
    <!-- base.html -->
    <div id="navbar" class="fixed top-6 left-1/2 transform -translate-x-1/2 z-50 transition-all duration-500">
        <div class="rounded-full px-10 py-4 flex items-center space-x-10
        {% if request.path == '/map/' %}
            bg-purple-600/80 border border-purple-400/30 shadow-[0_0_30px_rgba(255,0,255,0.4)]
        {% else %}
            backdrop-blur-xl bg-white/10 border border-white/20 shadow-2xl shadow-[0_0_30px_rgba(255,215,0,0.3)]
        {% endif %}">

            <a href="{% url 'home' %}" class="text-yellow-400 font-bold font-[Playfair_Display] text-xl">
                YatraPath 🛕
            </a>

            <a href="{% url 'home' %}"
                class="hover:text-yellow-400 transition font-[Poppins] {% if request.path == '/' %}text-yellow-400{% endif %}">
                Home
            </a>
            <a href="{% url 'temples' %}"
                class="hover:text-yellow-400 transition font-[Poppins] {% if request.path == '/temples/' %}text-yellow-400{% endif %}">
                Temples
            </a>
            <a href="{% url 'map' %}"
                class="hover:text-yellow-400 transition font-[Poppins] {% if request.path == '/map/' %}text-yellow-400{% endif %}">
                Map
            </a>
            <a href="{% url 'blog' %}"
                class="hover:text-yellow-400 transition font-[Poppins] {% if request.path == '/blog/' %}text-yellow-400{% endif %}">
                Blog
            </a>
        </div>
    </div>
    <!-- Page Content -->
    <main class="pt-2">
        {% block content %}
        {% endblock %}
    </main>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <script>
        AOS.init({
            duration: 1000,
            once: true
        });
    </script>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script id="temple-data" type="application/json">
[
{% for temple in all_temples %}
    {
        "name": "{{ temple.name|escapejs }}",
        "lat": {{ temple.latitude }},
        "lng": {{ temple.longitude }},
        "image": "{% if temple.image %}{{ temple.image.url }}{% endif %}",
        "description": "{{ temple.description|default:''|truncatechars:100|escapejs }}",
        "url": "{% url 'temple_detail' temple.id %}",
        "status": "{{ temple.status }}"
    }{% if not forloop.last %},{% endif %}
{% endfor %}
]
</script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {

            var map = L.map('map').setView([20.5937, 78.9629], 5);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);
            var greenIcon = new L.Icon({
                iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',
                shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
                iconSize: [25, 41],
                iconAnchor: [12, 41]
            });

            var redIcon = new L.Icon({
                iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
                shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
                iconSize: [25, 41],
                iconAnchor: [12, 41]
            });

            var blueIcon = new L.Icon({
                iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png',
                shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
                iconSize: [25, 41],
                iconAnchor: [12, 41]
            });
            const templeData = JSON.parse(
                document.getElementById('temple-data').textContent
            );

            var markers = [];

            var markers = [];

            templeData.forEach(function (temple) {

                var popupContent = `
        <div class="w-64 backdrop-blur-xl bg-white/30 rounded-2xl p-3 shadow-xl border border-white/20">
            
            ${temple.image ?
                        `<img src="${temple.image}" 
                      class="w-full h-32 object-cover rounded-xl mb-2">`
                        : ''
                    }

<h3 class="text-lg font-bold text-teal-700 drop-shadow-md">
    ${temple.name}
</h3>

<p class="text-sm text-white mt-1">
    ${temple.description || ''}
</p>

<a href="${temple.url}" 
    class="inline-block mt-3 text-yellow-400 hover:text-yellow-300 transition font-semibold">
    View Details
</a>

        </div>
    `;

                let selectedIcon;

                if (temple.status === "completed") {
                    selectedIcon = greenIcon;
                } else if (temple.status === "planned") {
                    selectedIcon = blueIcon;
                } else {
                    selectedIcon = redIcon;
                }

                var marker = L.marker([temple.lat, temple.lng], { icon: selectedIcon })
                    .addTo(map)
                    .bindPopup(popupContent);

                markers.push(marker);
            });

            // Auto fit map to all markers
            if (markers.length > 0) {
                var group = new L.featureGroup(markers);
                map.fitBounds(group.getBounds().pad(0.2));
            }

        });


    </script>
    <script>
        document.addEventListener("scroll", function () {
            const navbar = document.getElementById("navbar");

            if (window.scrollY > 50) {
                navbar.classList.add("scale-95");
                navbar.classList.add("top-3");
            } else {
                navbar.classList.remove("scale-95");
                navbar.classList.remove("top-3");
            }
        });
    </script>

</body>

</html>
