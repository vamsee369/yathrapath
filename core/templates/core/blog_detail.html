{% extends 'core/base.html' %}

{% block content %}

<!-- Blog Detail Section -->
<section class="max-w-4xl mx-auto px-6 py-32">



    <!-- Blog Title -->
    <h1 class="text-4xl md:text-5xl font-bold text-yellow-400 mb-4">
        {{ blog.title }}
    </h1>

    <!-- Date -->
    <p class="text-gray-400 text-sm mb-8">
        {{ blog.created_at|date:"F d, Y" }}
    </p>

    <!-- Content -->
    <div class="text-gray-300 text-lg leading-relaxed space-y-6">
        {{ blog.content|linebreaks }}
    </div>
    <!-- Blog Image -->
    {% if blog.image %}
    <img src="{{ blog.image.url }}" class="rounded-2xl w-full max-h-[600px] object-contain bg-black mb-8"> {% endif %}

    <!-- Back Button -->
    <div class="mt-12">
        <a href="{% url 'blog' %}"
            class="inline-block bg-yellow-500 text-black font-semibold px-6 py-3 rounded-xl hover:bg-yellow-400 transition">
            Back to Blogs
        </a>
    </div>

</section>

{% endblock %}
