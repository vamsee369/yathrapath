<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YathraPath</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold:       #eab308;
      --gold-light: #fbbf24;
      --gold-dim:   rgba(234,179,8,0.12);
      --gold-glow:  rgba(234,179,8,0.35);
      --bg:         #06060a;
      --bg2:        #0d0d14;
      --border:     rgba(234,179,8,0.18);
      --muted:      #6b7280;
      --text:       #e5e7eb;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }

    /* ── Canvas background ── */
    #bgCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.55;
    }

    /* ── Top status bar ── */
    #statusBar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 9px 24px;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: background 0.4s, color 0.4s, border-color 0.4s;
      border-bottom: 1px solid transparent;
    }
    #statusBar.s-checking  { background: rgba(107,114,128,0.12); border-color: rgba(107,114,128,0.2);  color: #9ca3af; }
    #statusBar.s-offline   { background: rgba(239,68,68,0.10);   border-color: rgba(239,68,68,0.22);   color: #f87171; }
    #statusBar.s-notfound  { background: rgba(234,179,8,0.08);   border-color: rgba(234,179,8,0.2);    color: var(--gold); }
    #statusBar.s-online    { background: rgba(34,197,94,0.10);   border-color: rgba(34,197,94,0.22);   color: #4ade80; }

    .bar-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
    }
    .s-offline .bar-dot, .s-checking .bar-dot {
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

    /* ── Main layout ── */
    #root {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
    }

    /* ── Left panel ── */
    .left {
      padding: 0 6vw 0 8vw;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.6rem;
    }
    .eyebrow-line {
      width: 32px; height: 1px;
      background: var(--gold);
      opacity: 0.6;
    }
    .eyebrow-text {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.8;
    }

    .main-heading {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 4.5vw, 3.8rem);
      line-height: 1.12;
      color: #fff;
      margin-bottom: 1.4rem;
    }
    .main-heading em {
      font-style: italic;
      color: var(--gold);
    }

    .sub-text {
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.8;
      max-width: 380px;
      margin-bottom: 2.4rem;
    }

    /* cached links */
    #cachedSection { margin-bottom: 2rem; }
    .cached-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.8rem;
    }
    .cached-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .cached-link {
      padding: 5px 15px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--gold-dim);
      color: var(--gold-light);
      font-size: 0.78rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s;
    }
    .cached-link:hover {
      background: rgba(234,179,8,0.22);
      border-color: rgba(234,179,8,0.5);
      box-shadow: 0 0 14px var(--gold-glow);
      transform: translateY(-1px);
    }

    .btn-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .btn-primary {
      padding: 0.72rem 1.9rem;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.88rem;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      transition: all 0.2s;
      box-shadow: 0 4px 24px rgba(234,179,8,0.28);
      letter-spacing: 0.02em;
    }
    .btn-primary:hover {
      background: var(--gold-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(234,179,8,0.45);
    }
    .btn-ghost {
      padding: 0.72rem 1.6rem;
      background: transparent;
      color: #9ca3af;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      font-weight: 400;
      font-size: 0.88rem;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      transition: all 0.2s;
    }
    .btn-ghost:hover {
      border-color: rgba(255,255,255,0.25);
      color: #fff;
      transform: translateY(-2px);
    }

    /* ── Right panel ── */
    .right {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 6vw;
    }

    .compass-wrap {
      position: relative;
      width: min(38vw, 420px);
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* outer glow ring */
    .compass-wrap::before {
      content: '';
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(234,179,8,0.08) 0%, transparent 70%);
      animation: breathe 4s ease-in-out infinite alternate;
    }
    @keyframes breathe {
      from { opacity: 0.5; transform: scale(0.96); }
      to   { opacity: 1;   transform: scale(1.04); }
    }

    #compassSvg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 28px rgba(234,179,8,0.2));
    }

    /* compass needle spin for offline */
    #compassNeedle {
      transform-origin: center;
      transition: transform 0.6s cubic-bezier(0.34,1.56,0.64,1);
    }
    .spin-lost #compassNeedle {
      animation: needleSpin 3s ease-in-out infinite;
    }
    @keyframes needleSpin {
      0%   { transform: rotate(0deg); }
      20%  { transform: rotate(42deg); }
      45%  { transform: rotate(-18deg); }
      70%  { transform: rotate(28deg); }
      100% { transform: rotate(0deg); }
    }

    /* code badge for 404 */
    .code-badge {
      position: absolute;
      bottom: 14%;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 6vw, 5rem);
      font-weight: 600;
      color: transparent;
      -webkit-text-stroke: 1px rgba(234,179,8,0.35);
      letter-spacing: 0.04em;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .show-404 .code-badge { opacity: 1; }

    /* ── Divider ── */
    .v-divider {
      position: fixed;
      top: 15vh;
      bottom: 15vh;
      left: 50%;
      width: 1px;
      background: linear-gradient(to bottom, transparent, var(--border) 30%, var(--border) 70%, transparent);
      z-index: 5;
    }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      #root {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        align-items: start;
        overflow-y: auto;
        padding-top: 56px;
      }
      .v-divider { display: none; }
      .right {
        order: -1;
        padding: 2rem 2rem 0;
      }
      .compass-wrap {
        width: min(56vw, 240px);
      }
      .left {
        padding: 1.5rem 2rem 3rem;
      }
      .main-heading { font-size: 2rem; }
    }

    /* ── Entrance animations ── */
    .fade-up {
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .d1 { animation-delay: 0.05s; }
    .d2 { animation-delay: 0.18s; }
    .d3 { animation-delay: 0.30s; }
    .d4 { animation-delay: 0.42s; }
    .d5 { animation-delay: 0.54s; }
  </style>
</head>
<body>

  <!-- Background canvas -->
  <canvas id="bgCanvas"></canvas>

  <!-- Status bar -->
  <div id="statusBar" class="s-checking">
    <div class="bar-dot"></div>
    <span id="barText">Checking connection…</span>
  </div>

  <!-- Vertical divider -->
  <div class="v-divider"></div>

  <div id="root">

    <!-- LEFT -->
    <div class="left">
      <div class="eyebrow fade-up d1">
        <div class="eyebrow-line"></div>
        <span class="eyebrow-text" id="eyebrowText">YathraPath</span>
      </div>

      <h1 class="main-heading fade-up d2" id="mainHeading">
        The path<br>has <em>gone quiet.</em>
      </h1>

      <p class="sub-text fade-up d3" id="subText">
        You're currently offline. Some destinations from your last journey are still accessible below — continue exploring what's been saved for you.
      </p>

      <div id="cachedSection" class="fade-up d4" style="display:none;">
        <div class="cached-label">Saved for offline</div>
        <div class="cached-links">
          <a class="cached-link" href="/">Home</a>
          <a class="cached-link" href="/destinations/">Destinations</a>
          <a class="cached-link" href="/map/">Map</a>
          <a class="cached-link" href="/blog/">Blog</a>
          <a class="cached-link" href="/about/">About</a>
        </div>
      </div>

      <div class="btn-row fade-up d5">
        <a href="/" class="btn-primary" id="primaryBtn">↺ &nbsp;Try Again</a>
        <button onclick="window.history.back()" class="btn-ghost">← &nbsp;Go Back</button>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
      <div class="compass-wrap" id="compassWrap">
        <svg id="compassSvg" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- outer ring -->
          <circle cx="150" cy="150" r="140" stroke="rgba(234,179,8,0.15)" stroke-width="1"/>
          <circle cx="150" cy="150" r="130" stroke="rgba(234,179,8,0.1)" stroke-width="0.5" stroke-dasharray="4 8"/>

          <!-- tick marks -->
          <g stroke="rgba(234,179,8,0.3)" stroke-width="1">
            <line x1="150" y1="10"  x2="150" y2="22"/>
            <line x1="150" y1="278" x2="150" y2="290"/>
            <line x1="10"  y1="150" x2="22"  y2="150"/>
            <line x1="278" y1="150" x2="290" y2="150"/>
          </g>
          <!-- diagonal ticks -->
          <g stroke="rgba(234,179,8,0.18)" stroke-width="0.7">
            <line x1="51"  y1="51"  x2="59"  y2="59"/>
            <line x1="249" y1="51"  x2="241" y2="59"/>
            <line x1="51"  y1="249" x2="59"  y2="241"/>
            <line x1="249" y1="249" x2="241" y2="241"/>
          </g>

          <!-- cardinal labels -->
          <text x="150" y="36" text-anchor="middle" fill="rgba(234,179,8,0.7)" font-family="Poppins" font-size="11" font-weight="600" letter-spacing="2">N</text>
          <text x="150" y="274" text-anchor="middle" fill="rgba(234,179,8,0.4)" font-family="Poppins" font-size="9">S</text>
          <text x="270" y="155" text-anchor="middle" fill="rgba(234,179,8,0.4)" font-family="Poppins" font-size="9">E</text>
          <text x="30"  y="155" text-anchor="middle" fill="rgba(234,179,8,0.4)" font-family="Poppins" font-size="9">W</text>

          <!-- inner circle -->
          <circle cx="150" cy="150" r="90" stroke="rgba(234,179,8,0.1)" stroke-width="1"/>
          <circle cx="150" cy="150" r="6"  fill="rgba(234,179,8,0.6)"/>
          <circle cx="150" cy="150" r="3"  fill="var(--gold)"/>

          <!-- needle -->
          <g id="compassNeedle">
            <!-- north — gold -->
            <polygon points="150,60 144,148 156,148" fill="var(--gold)" opacity="0.9"/>
            <!-- south — dim -->
            <polygon points="150,240 144,152 156,152" fill="rgba(234,179,8,0.25)"/>
          </g>

          <!-- inner decoration rings -->
          <circle cx="150" cy="150" r="55" stroke="rgba(234,179,8,0.08)" stroke-width="0.5"/>
          <circle cx="150" cy="150" r="30" stroke="rgba(234,179,8,0.06)" stroke-width="0.5"/>

          <!-- subtle text arc -->
          <path id="arcPath" d="M 50,150 A 100,100 0 0,1 250,150" fill="none"/>
          <text font-family="Poppins" font-size="7.5" fill="rgba(234,179,8,0.22)" letter-spacing="3.5" font-weight="500">
            <textPath href="#arcPath" startOffset="8%">DISCOVER · EXPLORE · WANDER · DISCOVER</textPath>
          </text>
        </svg>

        <!-- 404 ghost text -->
        <div class="code-badge" id="codeBadge">404</div>
      </div>
    </div>

  </div>

  <script>
    /* ── Canvas: floating particles + subtle grid ── */
    (function () {
      const canvas = document.getElementById('bgCanvas');
      const ctx    = canvas.getContext('2d');
      let W, H, pts = [];

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      function mkPt() {
        return {
          x:  Math.random() * W,
          y:  Math.random() * H,
          r:  0.6 + Math.random() * 1.4,
          vx: (Math.random() - 0.5) * 0.25,
          vy: -0.1 - Math.random() * 0.2,
          a:  Math.random(),
          da: 0.002 + Math.random() * 0.004,
        };
      }

      for (let i = 0; i < 55; i++) pts.push(mkPt());

      function draw() {
        ctx.clearRect(0, 0, W, H);

        /* grid lines */
        ctx.strokeStyle = 'rgba(234,179,8,0.025)';
        ctx.lineWidth   = 0.5;
        const gs = 80;
        for (let x = 0; x < W; x += gs) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
        for (let y = 0; y < H; y += gs) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

        /* particles */
        pts.forEach(p => {
          p.x += p.vx; p.y += p.vy; p.a += p.da;
          if (p.a > 1) p.da = -Math.abs(p.da);
          if (p.a < 0) p.da =  Math.abs(p.da);
          if (p.y < -10) { Object.assign(p, mkPt(), { y: H + 10 }); }

          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(234,179,8,${p.a * 0.55})`;
          ctx.fill();
        });

        requestAnimationFrame(draw);
      }
      draw();
    })();

    /* ── Mode switching ── */
    const bar        = document.getElementById('statusBar');
    const barText    = document.getElementById('barText');
    const eyebrow    = document.getElementById('eyebrowText');
    const heading    = document.getElementById('mainHeading');
    const sub        = document.getElementById('subText');
    const cached     = document.getElementById('cachedSection');
    const primaryBtn = document.getElementById('primaryBtn');
    const wrap       = document.getElementById('compassWrap');

    function setOffline() {
      bar.className      = 's-offline';
      barText.textContent = 'No internet connection';
      eyebrow.textContent = 'You\'re Offline';
      heading.innerHTML   = 'The path<br>has <em>gone quiet.</em>';
      sub.textContent     = 'You\'re currently offline. Destinations and pages you visited are still accessible — explore what\'s been saved for your journey.';
      cached.style.display = '';
      primaryBtn.textContent = '↺  Try Again';
      primaryBtn.href = '/';
      wrap.classList.add('spin-lost');
      wrap.classList.remove('show-404');
    }

    function setNotFound() {
      bar.className       = 's-notfound';
      barText.textContent  = 'Page not found';
      eyebrow.textContent  = '404 · Not Found';
      heading.innerHTML    = 'This destination<br><em>doesn\'t exist.</em>';
      sub.textContent      = 'The page you\'re looking for hasn\'t been charted yet — or it may have moved to a different path. Head back and keep exploring.';
      cached.style.display = 'none';
      primaryBtn.innerHTML = '⌂ &nbsp;Back to Home';
      primaryBtn.href = '/';
      wrap.classList.remove('spin-lost');
      wrap.classList.add('show-404');
    }

    async function detectMode() {
      try {
        const res = await fetch('/static/manifest.json?_=' + Date.now(), {
          cache: 'no-store',
          signal: AbortSignal.timeout(3000)
        });
        res.ok ? setNotFound() : setOffline();
      } catch {
        setOffline();
      }
    }

    detectMode();

    window.addEventListener('online', () => {
      bar.className       = 's-online';
      barText.textContent  = 'Connection restored — resuming…';
      setTimeout(() => window.location.href = '/', 1500);
    });

    window.addEventListener('offline', setOffline);
  </script>

</body>
</html>
